name: build-and-deploy

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write        

jobs:
  build-push-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        run: |
          TAG=${GITHUB_SHA::7}
          IMAGE=ghcr.io/k1nd4sus/k1nd4sus.github.io
          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE:$TAG | cut -d@ -f2)
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: k1nd4sus/k1nd4-cluster
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}          # the fine-grained PAT
          path: gitops

      - name: Bump image in values (yq, with rebase-retry)
        env:
          TAG:    ${{ steps.build.outputs.tag }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cd gitops
          git config user.name  "ci-bot"
          git config user.email "ci@k1nd4sus.it"

          yq -i '.image.tag = strenv(TAG) | .image.digest = strenv(DIGEST)' \
            charts/website/values.yaml

          git commit -am "k1nd4-website: deploy ${TAG} (${GITHUB_SHA})"

          # retry loop: survives concurrent pushes from other services' CI
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing (attempt $i)"
            git pull --rebase
            sleep $((RANDOM % 5 + 1))
          done
          echo "failed to push after 5 attempts" >&2
          exit 1
