name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_lc: ${{ steps.image-name.outputs.image_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name (GHCR requires it)
        id: image-name
        run: |
          echo "IMAGE_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
          echo "image_lc=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Trivy Scan on Docker Image
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_lc }}:latest
          format: 'json'
          output: trivy-report.json
          severity: 'CRITICAL'
          exit-code: '0'

      - name: Report critical CVEs (non-blocking)
        run: |
          critical_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)
          echo "Critical CVEs found: $critical_count"

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Ping website to check if it's up
        run: |
          for i in {1..10}; do
            if curl --fail --silent --show-error --location https://k1nd4sus.it/ > /dev/null; then
              echo "Website is up!"
              exit 0
            else
              echo "Website is not up yet. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          echo "Website did not come up after 10 attempts. Failing the job."
          exit 1

          
